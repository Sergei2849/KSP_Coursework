<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Двигатели</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">Engine Service</a>
        <nav>
            <a href="index.html">Главная</a>
            <a href="engines.html">Двигатели</a>
            <a href="parts.html">Детали</a>
            <a href="requests.html">Заявки</a>
            <a href="stats.html" data-staff>Статистика</a>
            <a href="logs.html" data-admin>Логи</a>
            <a href="login.html">Вход</a>
        </nav>
    </header>

    <main class="page">
        <section class="panel">
            <div class="section-head">
                <div>
                    <p class="eyebrow">Справочник</p>
                    <h1>Двигатели</h1>
                </div>
                <button id="refreshEngines" class="button" type="button">Обновить</button>
            </div>

            <form id="engineForm" class="form inline-form">
                <label>Модель <input name="model" required></label>
                <label>Тип <input name="engine_type" required></label>
                <label>Мощность, л.с. <input name="power_hp" type="number" min="1"></label>
                <label>Объем, л <input name="volume_liters" type="number" min="0.1" step="0.1"></label>
                <label>Серийный номер <input name="serial_number"></label>
                <label class="wide">Описание <textarea name="description" rows="2"></textarea></label>
                <button class="button primary" type="submit">Добавить</button>
            </form>
            <p id="engineMessage" class="message"></p>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Модель</th>
                            <th>Тип</th>
                            <th>Мощность</th>
                            <th>Объем</th>
                            <th>Серийный номер</th>
                            <th>Добавил</th>
                        </tr>
                    </thead>
                    <tbody id="enginesTable"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
