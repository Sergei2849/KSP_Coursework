<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Детали</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">Engine Service</a>
        <nav>
            <a href="index.html">Главная</a>
            <a href="engines.html">Двигатели</a>
            <a href="parts.html">Детали</a>
            <a href="requests.html">Заявки</a>
            <a href="stats.html" data-staff>Статистика</a>
            <a href="logs.html" data-admin>Логи</a>
            <a href="login.html">Вход</a>
        </nav>
    </header>

    <main class="page">
        <section class="panel">
            <div class="section-head">
                <div>
                    <p class="eyebrow">Справочник</p>
                    <h1>Детали двигателя</h1>
                </div>
                <input id="partSearch" class="search" placeholder="Поиск детали">
            </div>

            <form id="partForm" class="form inline-form">
                <label>Двигатель <select name="engine_id" required></select></label>
                <label>Деталь <input name="name" required></label>
                <label>Код <input name="part_code"></label>
                <label>Состояние
                    <select name="condition">
                        <option>Исправна</option>
                        <option>В диагностике</option>
                        <option>Требует замены</option>
                        <option>Заменена</option>
                    </select>
                </label>
                <label class="wide">Примечание <textarea name="note" rows="2"></textarea></label>
                <button class="button primary" type="submit">Добавить</button>
            </form>
            <p id="partMessage" class="message"></p>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Деталь</th>
                            <th>Код</th>
                            <th>Двигатель</th>
                            <th>Состояние</th>
                            <th>Примечание</th>
                        </tr>
                    </thead>
                    <tbody id="partsTable"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
