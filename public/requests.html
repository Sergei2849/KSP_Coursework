<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Заявки</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">Engine Service</a>
        <nav>
            <a href="index.html">Главная</a>
            <a href="engines.html">Двигатели</a>
            <a href="parts.html">Детали</a>
            <a href="requests.html">Заявки</a>
            <a href="stats.html" data-staff>Статистика</a>
            <a href="logs.html" data-admin>Логи</a>
            <a href="login.html">Вход</a>
        </nav>
    </header>

    <main class="page">
        <section class="panel">
            <div class="section-head">
                <div>
                    <p class="eyebrow">Сервис</p>
                    <h1>Заявки на обслуживание</h1>
                </div>
                <button id="exportRequests" class="button" type="button">CSV</button>
            </div>

            <form id="requestForm" class="form inline-form">
                <label>Двигатель <select name="engine_id" required></select></label>
                <label>ФИО клиента <input name="client_name" required minlength="3"></label>
                <label>Телефон <input name="phone"></label>
                <label>Приоритет
                    <select name="priority">
                        <option>Обычный</option>
                        <option>Высокий</option>
                        <option>Срочный</option>
                    </select>
                </label>
                <label class="wide">Проблема <textarea name="problem" rows="3" required minlength="10"></textarea></label>
                <button class="button primary" type="submit">Создать заявку</button>
            </form>
            <p id="requestMessage" class="message"></p>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>№</th>
                            <th>Двигатель</th>
                            <th>Клиент</th>
                            <th>Проблема</th>
                            <th>Приоритет</th>
                            <th>Статус</th>
                            <th data-admin>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="requestsTable"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
