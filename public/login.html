<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">Engine Service</a>
        <nav>
            <a href="index.html">Главная</a>
            <a href="engines.html">Двигатели</a>
            <a href="parts.html">Детали</a>
            <a href="requests.html">Заявки</a>
            <a href="stats.html" data-staff>Статистика</a>
            <a href="logs.html" data-admin>Логи</a>
            <a href="login.html">Вход</a>
        </nav>
    </header>

    <main class="page">
        <section class="panel auth-panel">
            <div>
                <p class="eyebrow">Аккаунт</p>
                <h1>Вход и регистрация</h1>
                <p id="currentUserLabel" class="muted">Вход не выполнен</p>
            </div>

            <div class="two-column">
                <form id="loginForm" class="form">
                    <h2>Войти</h2>
                    <label>Email <input name="email" type="email" required></label>
                    <label>Пароль <input name="password" type="password" minlength="4" required></label>
                    <button class="button primary" type="submit">Войти</button>
                    <p id="loginMessage" class="message"></p>
                </form>

                <form id="registerForm" class="form">
                    <h2>Регистрация</h2>
                    <label>Имя <input name="name" required minlength="2"></label>
                    <label>Email <input name="email" type="email" required></label>
                    <label>Пароль <input name="password" type="password" minlength="4" required></label>
                    <button class="button primary" type="submit">Зарегистрироваться</button>
                    <p id="registerMessage" class="message"></p>
                </form>
            </div>

            <button id="logoutButton" class="button" type="button">Выйти</button>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
